[build]
  publish = "."

# ── Security & asset headers ───────────────────────────────────
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type                = "application/json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

# ── Clean URL rewrites (200 = serve, no redirect flash) ────────
[[redirects]]
  from   = "/config"
  to     = "/config.html"
  status = 200

[[redirects]]
  from   = "/download"
  to     = "/download.html"
  status = 200

[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200

[[redirects]]
  from   = "/dmca"
  to     = "/dmca.html"
  status = 200

# ── SPA fallback ───────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
