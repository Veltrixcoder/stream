[build]
  publish = "."

# ── Asset headers ──────────────────────────────────────────────
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type  = "application/json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

# ── Clean URL redirects ────────────────────────────────────────
# /config  → config.html
[[redirects]]
  from   = "/config"
  to     = "/config.html"
  status = 200

# /download → download.html
[[redirects]]
  from   = "/download"
  to     = "/download.html"
  status = 200

# /privacy → privacy.html
[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200

# SPA fallback — everything else → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
